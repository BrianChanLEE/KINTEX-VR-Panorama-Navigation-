    <style>
        html,
        body {
            width: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            overflow: hidden;
        }

        body * {
            touch-action: none;
        }

        #vr_player {
            width: 100%;
            height: 100%;
        }

        #pswp {
            top: 60px;
            height: calc(100% - 60px);
        }

        .info-nav a {
            margin: 0 17px 0 0;
            background: url(/convention_kor/images/vr/pc/sub/btn_infoNav.png) no-repeat;
        }

        .vr-nav a {
            margin: 0 0 0 17px;
            background: url(/convention_kor/images/vr/pc/sub/btn_vrNav.png) no-repeat;
        }

        .util-nav a {
            float: left;
            width: 49px;
            height: 49px;
            overflow: hidden;
            text-indent: -9999px;
        }

        .info-nav {
            position: fixed;
            bottom: 30px;
            left: 30px;
        }

        .info-nav a:hover {
            background-position-y: -49px;
        }

        .info-nav .btn-info {
            background-position: 0 0;
        }

        .info-nav .btn-safe {
            background-position: -66px 0;
        }

        .info-nav .btn-place {
            background-position: -132px 0;
        }

        .vr-nav {
            position: fixed;
            bottom: 30px;
            right: 30px;
        }

        .vr-nav a:hover {
            background-position-y: -49px;
        }

        .vr-nav .btn-menu1 {
            background-position: 0 0;
        }

        .vr-nav .btn-menu2 {
            background-position: -132px 0;
        }

        .vr-nav .btn-menu3 {
            background-position: -198px 0;
        }

        .vr-nav .btn-menu4 {
            background-position: -264px 0;
        }

        .vr-nav .btn-menu5 {
            background-position: -330px 0;
        }

        .vr-nav .btn-menu6 {
            background-position: -66px 0;
        }

        .modal-body .info li {
            padding: 10px 0;
            border-bottom: 1px solid #2f3749;
        }

        .info-nav a.enabled,
        .vr-nav a.enabled {
            background-position-y: -49px;
        }

        .enabled .text {
            color: #b80009;
        }

        #sub-box .enabled .information-safety {
            background: url('/convention_kor/images/vr/new/information_safety_on.png') no-repeat center center;
        }

        #sub-box .enabled .information-space {
            background: url('/convention_kor/images/vr/new/information_space_on.png') no-repeat center center;
        }

        #sub-box .enabled .information-auto {
            background: url('/convention_kor/images/vr/new/information_auto_on.png') no-repeat center center;
        }

        #sub-box .enabled .information-sample {
            background: url('/convention_kor/images/vr/new/information_sample_on.png') no-repeat center center;
        }
    </style>

        .lucid-video-control-bar .lucid-seekbar .highlight-wrap .highlight-marker {
            position: absolute;

            height: 9px;
            background: #fff;

            top: 4px

        .lucid-video-control-bar .lucid-seekbar .highlight-wrap .highlight-marker.active {
            width: 8px;
            height: 8px;
            border-radius: 10px;
            border: 4px solid #ffaf31;
            top: 2px;

        }

        .lucid-video-control-bar .lucid-seekbar .highlight-wrap .highlight-marker:not(.mobile):hover {
            cursor: pointer
        }

        }

        .lucid-video-control-bar .lucid-seekbar .highlight-wrap .highlight-marker .thumb-nail>img {
            position: static !important;
            width: 100%
        }

        .lucid-video-control-bar .lucid-seekbar .highlight-wrap .highlight-marker .thumb-nail {
            position: absolute;
            display: none;
            width: 156px;
            margin-left: -78px;
            border: 1px solid #000;
            left: 50%;
            bottom: 18px
        }

        .lucid-video-control-bar .lucid-seekbar .highlight-wrap .highlight-marker .thumb-nail .shooting-date {
            position: absolute;
            display: inline-block;
            color: #fff;
            width: 100%;
            left: 1px;
            bottom: 0;
            background: rgba(0, 0, 0, .7);
            text-align: center;
            font-size: 12px;
            line-height: 23px
        }

    <script type="text/javascript">
        var sceneId = 2404;

        var ctxtPath = "";
        var autoTourInfo = null;
        var mapHotspot = new Object();
        var availClient = true;
        var firstEntry = false;
        var leftUser;
        $(document).ready(function () {
            if (parent.famTour) {
                $('.panorama-information').hide();
                $('.panorama-menu').hide();
            }
        });
        function controlSpaceLayer(onOff) {
            console.log('controlSpaceLayer:::' + onOff);
            if (onOff == 'on' && !vrplayer.isSpaceLayerVisible()) {
                $('#toggle_space_layer_visibility').click();
                $('#toggle_space_layer_visibility').css('color', '#b80009');
            } else {
                if (vrplayer.isSpaceLayerVisible()) {
                    $('#toggle_space_layer_visibility').click();
                    $('#toggle_space_layer_visibility').css('color', '#000000');
                }
            }
        }
        function controlSafetyLayer(onOff) {
            console.log('controlSafetyLayer:::' + onOff);
            if (onOff == 'on' && !vrplayer.isSafetyLayerVisible()) {
                $('#toggle_safety_layer_visibility').css('color', '#b80009');
                $('#toggle_safety_layer_visibility').click();
            } else {
                if (vrplayer.isSafetyLayerVisible()) {
                    $('#toggle_safety_layer_visibility').click();
                    $('#toggle_safety_layer_visibility').css('color', '#000000');
                }
            }
        }
        function onVideoPlayerLoaded(videoPlayer) {

        }

        function onPageLoaded() {
            console.log("####### famTour" + parent.famTour);
            console.log('VR Player page loaded successfully.');
            console.log(window);
            vrplayer.init('vr_player', 'pswp', ctxtPath, false, 'ko');
            vrplayer.loadScene(sceneId, function () {
                console.log('Load scene ' + sceneId + ' success');

                if (vrplayer.isVideo())
                    vrplayer.playVideo();

                if (parent && parent.onPlayerLoaded)
                    parent.onPlayerLoaded();

                $('#vr_player').focusin(function () {
                    if (parent && parent.onPlayerIdle) {
                        parent.onPlayerIdle();
                    }
                });
                $('#vr_player').click(function () {
                    if (parent && parent.onPlayerIdle) {
                        parent.onPlayerIdle();
                    }
                });
                $('#vr_player').focusout(function () {
                    if (parent && parent.onPlayerIdleEnded) {
                        parent.onPlayerIdleEnded();
                    }
                });

                checkMenuVisible(vrplayer.currentScene)




            }, function (reason) {
                console.log(reason);
            });
            //$('#dialog').dialog();

            //Virtual Tour를 위한 이벤트 등록
            window.addEventListener('message', function (e) {
                //console.log('child message');
                //console.log(e.data); // { parentData : 'test parent data' }
                //console.log("e.origin : " + e.origin); //http://abc.com(부모창 도메인)
                window.parent.postMessage({ currentScene: vrplayer.currentScene, method: 'currentScene' }, "*");
                //	if(e.data.parentData === 'currentScene'){
                //		console.log(vrplayer.currentScene);
                //		 window.parent.postMessage({currentScene: currentScene, method:'currentScene'},"*");

                //	}
                if (e.data.parentData === 'changeScene') {
                    changeScene(e.data.sceneId);
                }

                if (e.data.parentData === 'lookAt') {
                    vrplayer.lookAt(e.data.hDeg, e.data.vDeg, e.data.imm);
                }
                //강조하기 핫스팟
                if (e.data.parentData === 'hostHighLight') {
                    var hotspotHighLight = {
                        id: 'hostHighLight',
                        layer: 'info',
                        name: 'hostHighLight',
                        // url:'/convention_kor/images/vr/rtc/host_accent.png',
                        // url:'/convention_kor/images/vr/rtc/icon_emphasis_on.png',
                        url: '/convention_kor/images/vr/new/emphasis.png',
                        width: 100,
                        height: 100,
                        hDeg: e.data.hDeg,
                        vDeg: e.data.vDeg,
                        isVideo: false, //actions.onClick.sceneId,
                        actions: {
                            onClick: {
                                sceneId: 0
                            }
                        },
                        kind: '',
                        changeEffect: ''

                    }
                    vrplayer.addHotspotDemo(hotspotHighLight);
                    setTimeout(function () {
                        vrplayer.removeHotspotDemo('hostHighLight');
                    }, 5000); // 3000ms(3초)가 경과하면 이 함수가 실행됩니다.

                }
                if (e.data.parentData === 'addHotspotParent') {

                    var hotspotInfo = {
                        id: e.data.hotspot.id,
                        layer: 'info',
                        name: e.data.hotspot.id,
                        url: e.data.hotspot.url,
                        width: e.data.hotspot.width,
                        height: e.data.hotspot.height,
                        hDeg: e.data.hotspot.hDeg,
                        vDeg: e.data.hotspot.vDeg,
                        isVideo: false, //actions.onClick.sceneId,
                        actions: {
                            onClick: {
                                sceneId: 0
                            }
                        },
                        kind: '',
                        changeEffect: ''

                    }
                    vrplayer.addHotspotDemo(hotspotInfo);
                }

                if (e.data.parentData === 'removeHotspotParent') {

                    vrplayer.removeHotspot(e.data.hotspot.id);

                }
                if (e.data.parentData === 'addHotspot') {
                    var hotspotInfo = {
                        id: 'user',
                        layer: 'info',
                        name: 'user',
                        url: '/public/demo/infohotspot.png',
                        width: 640,
                        height: 360,
                        hDeg: e.data.hDeg,
                        vDeg: e.data.vDeg,
                        isVideo: false, //actions.onClick.sceneId,
                        actions: {
                            onClick: {
                                sceneId: 0
                            }
                        },
                        kind: '',
                        changeEffect: ''

                    }
                    vrplayer.addHotspotDemo(hotspotInfo);
                }
                if (e.data.parentData === 'removeHotspot') {
                    vrplayer.removeHotspot('user');
                }
                if (e.data.parentData === 'getLookAt') {
                    window.parent.postMessage({ currentLookAt: vrplayer.getCurrentLookAt(), method: e.data.parentData }, '*');
                }
                if (e.data.parentData === 'screenSharing') {
                    window.parent.postMessage({ method: e.data.parentData }, '*');
                }
                if (e.data.parentData === 'safety') {
                    window.parent.postMessage({ method: e.data.parentData }, '*');
                }
                if (e.data.parentData === 'space') {
                    window.parent.postMessage({ method: e.data.parentData }, '*');
                }
                if (e.data.parentData === 'place') {
                    window.parent.postMessage({ method: e.data.parentData }, '*');
                }
                if (e.data.parentData === 'toggle_chk') {
                    window.parent.postMessage({ method: e.data.parentData }, '*');
                }
                if (e.data.parentData === 'hostScene') {
                    if (!firstEntry) {
                        console.log("e.data.parentData ::  hostScene");
                        console.log(e.data);
                        changeScene(e.data.sceneId);
                        firstEntry = true;
                    }

                }
                if (e.data.parentData === 'eventInfo') {
                    console.log("e.data.parentData ::  eventInfo PC");
                    console.log(e.data);
                }

                if (e.data.parentData === 'getHighLightLookAt') {

                    window.parent.postMessage({ currentLookAt: vrplayer.getCurrentLookAt(), method: e.data.parentData }, '*');
                }

                if (e.data.parentData === 'removeClient') {
                    console.log(e.data.userinfo);
                    vrplayer.removeHotspotDemo('user' + e.data.userinfo.id);
                    mapHotspot[e.data.userinfo.id] = null;
                    leftUser = e.data.userinfo;
                }

                if (e.data.parentData === 'clientLookAt') {
                    if (availClient == false) return;
                    if (e.data.userinfo !== undefined) {
                        if (mapHotspot[e.data.userinfo.id] == null) {
                            var userHotspot = {
                                id: 'user' + e.data.userinfo.id,
                                layer: 'info',
                                name: 'user',
                                url: e.data.userinfo.hotspot,
                                width: 50,
                                height: 50,
                                hDeg: e.data.hDeg,
                                vDeg: e.data.vDeg,
                                isVideo: false, //actions.onClick.sceneId,
                                actions: {
                                    onClick: {
                                        sceneId: 0
                                    }
                                },
                                kind: '',
                                changeEffect: ''

                            };
                            console.log(userHotspot);
                            vrplayer.addHotspotDemo(userHotspot);
                            mapHotspot[e.data.userinfo.id] = userHotspot;
                        }
                        else {
                            vrplayer.setHotspotDegree('user' + e.data.userinfo.id, e.data.hDeg, e.data.vDeg);
                        }
                    }
                }

                if (e.data.parentData === 'toggleSafetyLayer') {
                    vrplayer.toggleSafetyLayer();
                }

                if (e.data.parentData === 'toggleSpaceLayer') {
                    vrplayer.toggleSpaceLayer();
                }

                if (e.data.parentData === 'startAutoRotation') {
                    vrplayer.startAutoRotation(30, 5);
                }

                if (e.data.parentData === 'stopAutoRotation') {
                    vrplayer.stopAutoRotation();
                }

            });

            $('input.guide-never-see-again').change(function (e) {
                var cookies = []; // (document.cookie === '')? [] : document.cookie.split(';');
                var checked = $(this).is(':checked');
                var modified = false;
                var expireDate = new Date(2099, 12, 31).toUTCString();

                for (var i = 0; i < cookies.length; ++i) {
                    if (cookies[i].trim().match(/^showMouseGuide=.*/)) {
                        cookies[i] = 'showMouseGuide=' + ((checked) ? 'n' : 'y');
                        cookies.splice(i + 1, 0, 'expires=' + expireDate);
                        modified = true;
                        break;
                    }
                }
                if (!modified) {
                    cookies.push('showMouseGuide=' + ((checked) ? 'n' : 'y'));
                    cookies.push('expires=' + expireDate);
                }

                document.cookie = cookies.join(';');
            });
            $('button.guide-close').click(function (e) {
                $('.guide-window').remove();
            });

            if (vrplayer.isInSampleView())
                $('#toggle_sample_view').addClass('enabled');
            else
                $('#toggle_sample_view').removeClass('enabled');

            if (vrplayer.fullscreenEntered())
                $('#toggle_fullscreen').addClass('enabled');
            else
                $('#toggle_fullscreen').removeClass('enabled');


            $('#toggle_safety_layer_visibility').click(function (e) {
                vrplayer.toggleSafetyLayer();
                $(this).toggleClass('enabled');
            });
            $('#toggle_space_layer_visibility').click(function (e) {
                vrplayer.toggleSpaceLayer();
                $(this).toggleClass('enabled');
            });

            $('#toggle_diy').click(function (e) {
                vrplayer.toggleDiyBoxes();
                $(this).toggleClass('enabled');
            });
            $('#toggle_sample_view').click(function (e) {
                var self = this;
                if (vrplayer.isInSampleView()) {
                    vrplayer.exitSampleView(
                        function () { $(self).removeClass('enabled'); },
                        function (msg) { console.error(msg); }
                    );
                } else {
                    vrplayer.enterSampleView(
                        function () { $(self).addClass('enabled'); },
                        function (msg) { console.error(msg); }
                    );
                }
            });
            $('#toggle_vr_mode').click(function (e) {
                vrplayer.toggleVRMode();
            });
            $('#toggle_fullscreen').click(function (e) {
                vrplayer.toggleFullscreen();
            });

            if (vrplayer.isSafetyLayerVisible())
                $('#toggle_safety_layer_visibility').addClass('enabled');
            else
                $('#toggle_safety_layer_visibility').removeClass('enabled');

            if (vrplayer.isSpaceLayerVisible())
                $('#toggle_space_layer_visibility').addClass('enabled');
            else
                $('#toggle_space_layer_visibility').removeClass('enabled');

            if (vrplayer.isSafetyLayerVisible() || vrplayer.isSpaceLayerVisible() || vrplayer) {
            }
        }

        function changeScene(_id) {
            sceneId = _id;
            availClient = false;
            // vrplayer.loadScene(
            vrplayer.loadScene(
                _id,
                function () {
                    console.log('load success');
                    console.log(vrplayer.currentScene);
                    availClient = true;
                    // setInterval(() => {
                    // 	getCurrentLootAt();
                    // }, 100);

                    // vrplayer.setHotspotClicked(hotspotclicked);
                    mapHotspot = new Object;
                    checkMenuVisible(vrplayer.currentScene);
                }
            );
            mapHotspot = null;
        }

        function fetchAutoTourInfo() {
            $.ajax({
                /* autoTourInfoRequestURL assigned by parent */
                url: autoTourInfoRequestURL,
                type: 'GET',
                contentType: 'application/json'
            }).done(function (response) {
                autoTourInfo = JSON.parse(response);
                if (autoTourInfo && autoTourInfo.data) {

                    startidx = 0;


                    for (idx = 0; idx < autoTourInfo.data[0].tourScenes.length; idx++) {

                        if (autoTourInfo.data[0].tourScenes[idx].refSceneID === vrplayer.currentSceneId) {
                            startidx = idx;
                            break;
                        }
                    }
                    vrplayer.startAutoTour(autoTourInfo.data[0], startidx);
                    $('#toggle_auto_tour').addClass('enabled');
                }
            }).fail(function (xhr, status, err) {
                console.error('Fetch autotour data failed: ' + err);
            });
        }

        $('#toggle_auto_tour').click(function () {
            if (vrplayer.autoTourEnabled()) {
                vrplayer.stopAutoTour();
                $('#toggle_auto_tour').removeClass('enabled');
            } else {
                if (!autoTourInfo) {
                    fetchAutoTourInfo();
                }
                if (autoTourInfo && autoTourInfo.data) {


                    startidx = 0;

                    for (idx = 0; idx < autoTourInfo.data[0].tourScenes.length; idx++) {

                        if (autoTourInfo.data[0].tourScenes[idx].refSceneID === vrplayer.currentSceneId) {
                            startidx = idx;
                            break;
                        }
                    }
                    vrplayer.startAutoTour(autoTourInfo.data[0], startidx);


                    $('#toggle_auto_tour').addClass('enabled');
                }
            }
        });
        function viewParentGeneralInfo() {

            parent.viewGeneralInfo();
        }

        function viewParentSceneGroup() {
            parent.viewSceneGroup();
        }

        function checkMenuVisible(_sceneData) {
            if (parent.famTour) {
                return;
            }
            var visibilities = _sceneData.controlVisibilities;

            console.log(visibilities);

            if (visibilities.safetyLayer === false
                && visibilities.commonInfo === false
                && visibilities.spaceLayer === false) {
                $('#panorama-information').hide();
            }
            else {

                $('#panorama-information').show();
            }
        }

    </script>
